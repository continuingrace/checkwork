<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Schedule</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Schedule">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --green-dark:#1a4a2e;--lime:#c8f000;--lime-dark:#9ab800;
  --bg:#e8e8e2;--white:#f8f8f4;--surface:#e4e4de;
  --text:#1a1a1a;--muted:#999;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','Noto Sans KR','Apple SD Gothic Neo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:36px 28px 60px}
.app{max-width:1100px;margin:0 auto}

.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-box{background:var(--white);border-radius:24px;padding:40px 36px;width:min(400px,90vw);box-shadow:0 4px 24px rgba(0,0,0,.1)}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-.5px}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:28px}
.login-label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px;margin-top:14px}
.login-input{width:100%;font-size:15px;font-family:var(--font);padding:11px 14px;border:none;border-radius:12px;background:var(--surface);color:var(--text);outline:none}
.login-input:focus{background:#dcdcd5}
.login-btn{width:100%;margin-top:20px;font-size:15px;font-family:var(--font);font-weight:600;padding:13px;border:none;border-radius:12px;background:var(--lime);color:var(--text);cursor:pointer}
.login-btn:hover{background:var(--lime-dark)}
.login-msg{font-size:13px;text-align:center;margin-top:14px;color:var(--muted);min-height:20px}
.login-toggle{font-size:13px;text-align:center;margin-top:12px;color:var(--muted)}
.login-toggle span{color:var(--green-dark);cursor:pointer;font-weight:500}

.top-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:var(--white);border-radius:16px;padding:18px 22px}
.stat-label{font-size:13px;color:var(--muted);margin-bottom:6px}
.stat-val{font-size:36px;font-weight:300;letter-spacing:-1px}
.stat-card.clickable{cursor:pointer;transition:background .15s}
.stat-card.clickable:hover{background:#efefea}

.profile-header{display:flex;align-items:center;gap:18px;margin-bottom:20px}
.profile-avatar-wrap{width:56px;height:56px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--muted)}
.profile-avatar{width:100%;height:100%;object-fit:cover;display:none}
.profile-info{flex:1}
.profile-name{font-size:22px;font-weight:600;letter-spacing:-.5px}
.profile-name-en{font-weight:600;font-size:22px;letter-spacing:-.5px}
.profile-sub{font-size:14px;color:var(--muted);margin-top:2px}
.profile-edit-btn{font-size:12px;color:var(--muted);cursor:pointer;border:none;background:none;padding:4px 8px;border-radius:6px;margin-left:8px}
.profile-edit-btn:hover{background:var(--surface)}
.profile-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.today-badge{font-size:14px;color:var(--muted);white-space:nowrap}
.logout-btn{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:6px}
.logout-btn:hover{background:var(--surface)}

.card{background:var(--white);border-radius:20px;padding:26px 28px;margin-bottom:16px}
.section-label{font-size:12px;font-weight:500;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}

.month-nav{display:flex;align-items:center;gap:12px}
.nav-btn{width:30px;height:30px;border-radius:50%;background:var(--surface);border:none;cursor:pointer;font-size:12px;color:var(--text);display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:var(--lime)}
.month-txt{font-size:17px;font-weight:500;letter-spacing:-.3px}
.cal-wrap{overflow-x:auto}
.cal-table{width:100%;border-collapse:separate;border-spacing:3px;min-width:480px}
.cal-table th{font-size:14px;font-weight:500;color:var(--muted);padding:6px 0 10px;text-align:center}
.cal-table th.sun{color:#e03030}
.cal-day-row td{padding:2px 3px;text-align:center;vertical-align:top}
.day-cell{font-size:16px;font-weight:400;padding:10px 4px 4px;border-radius:10px;color:var(--text);line-height:1;display:inline-block;width:100%;min-width:34px;letter-spacing:-.3px;cursor:pointer;position:relative}
.day-cell:hover{background:var(--surface)}
.day-cell.today{background:#c8f000;color:#1a1a1a;font-weight:600}
.day-cell.sunday{color:#e03030}
.day-cell.holiday{color:#e03030;font-weight:500}
.day-cell.other-month{color:#ccc;pointer-events:none}
.day-cell.selected-day{outline:2px solid var(--lime-dark);outline-offset:1px}
.sched-dot{width:5px;height:5px;border-radius:50%;background:var(--lime-dark);margin:3px auto 0;display:block}
.bar-row td{padding:2px 3px;position:relative}

.day-panel{background:var(--surface);border-radius:14px;padding:14px 16px;margin-top:14px}
.day-panel-title{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px}
.day-panel-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:14px}
.day-panel-item:last-child{border-bottom:none}
.day-panel-empty{font-size:13px;color:var(--muted)}

.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(0,0,0,.06)}
.legend-item{display:flex;align-items:center;gap:7px;font-size:14px;color:#555}
.legend-dot{width:12px;height:12px;border-radius:4px;flex-shrink:0}
.holiday-note{font-size:13px;color:var(--muted);margin-top:10px}
.save-notice{font-size:12px;color:var(--green-dark);opacity:0;transition:opacity .3s;text-align:right;margin-top:8px}
.save-notice.show{opacity:1}

.proj-add{display:flex;gap:8px;flex-wrap:nowrap;margin-top:18px;padding-top:18px;border-top:1px solid rgba(0,0,0,.06);align-items:center}
input,select{font-size:15px;font-family:var(--font);padding:11px 14px;border:none;border-radius:12px;background:var(--surface);color:var(--text);outline:none;transition:background .15s}
input:focus,select:focus{background:#dcdcd5}
.proj-add input[type=text]{flex:1;min-width:60px}
.proj-add select{flex-shrink:0;font-size:14px;padding:11px 8px}
button.add-btn{font-size:15px;font-family:var(--font);font-weight:500;padding:11px 20px;border:none;border-radius:12px;background:var(--lime);color:var(--text);cursor:pointer;white-space:nowrap}
button.add-btn:hover{background:var(--lime-dark)}

.schedule-list{display:flex;flex-direction:column;gap:8px}
.sched-item{display:flex;gap:16px;align-items:center;padding:16px 18px;border-radius:14px;background:var(--surface)}
.sched-time{font-size:15px;font-weight:500;color:var(--muted);min-width:54px}
.sched-accent{width:3px;border-radius:3px;height:32px;flex-shrink:0}
.sched-info{flex:1;display:flex;align-items:center;gap:10px}
.sched-title-txt{font-size:17px;font-weight:400;flex:1}
.sched-tag{font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px;white-space:nowrap}
.sched-add-row{display:flex;gap:8px;margin-top:14px;flex-wrap:nowrap;align-items:center}
.sched-add-row input[type=text]{flex:1;min-width:0}
.sched-add-row select{flex-shrink:0}
.empty-msg{font-size:15px;color:var(--muted);padding:10px 0}
.del-btn{font-size:13px;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:6px;border:none;background:transparent;flex-shrink:0}
.del-btn:hover{background:rgba(0,0,0,.07);color:var(--text)}
#schedDatePicker{font-size:12px;padding:4px 8px;border-radius:8px;background:var(--surface);border:none;color:var(--muted);cursor:pointer;font-family:var(--font)}

.date-btn{font-size:13px;font-family:var(--font);padding:11px 14px;border:none;border-radius:12px;background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;min-width:90px;text-align:center}
.date-btn.selected{color:var(--text);font-weight:500}
.date-btn:hover{background:#dcdcd5}
.datepick-wrap{position:relative;flex-shrink:0}
.datepick-popup{position:absolute;top:calc(100% + 8px);left:0;z-index:300;background:var(--white);border-radius:16px;padding:16px;box-shadow:0 4px 32px rgba(0,0,0,.14);display:none;width:260px}
.datepick-popup.open{display:block}
.dp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dp-month-txt{font-size:14px;font-weight:600}
.dp-nav{width:26px;height:26px;border:none;background:var(--surface);border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.dp-nav:hover{background:var(--lime)}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.dp-label{font-size:11px;color:var(--muted);padding:3px 0;font-weight:500}
.dp-label.sun{color:#e03030}
.dp-cell{font-size:13px;padding:6px 2px;border-radius:7px;cursor:pointer;color:var(--text);line-height:1}
.dp-cell:hover{background:var(--surface)}
.dp-cell.other{color:#ccc;cursor:default}
.dp-cell.today-mark{font-weight:600}
.dp-cell.selected-start{background:var(--green-dark);color:var(--lime);font-weight:600}
.dp-cell.selected-end{background:var(--green-dark);color:var(--lime);font-weight:600}
.dp-cell.in-range{background:#e0f0e0}
.dp-cell.holiday,.dp-cell.sunday{color:#e03030}

.status-badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;border:none;font-family:var(--font)}
.status-badge:hover{opacity:.75}
.toggle-btn{font-size:12px;font-family:var(--font);padding:5px 12px;border:none;border-radius:8px;background:var(--surface);color:var(--muted);cursor:pointer}
.toggle-btn.active{background:var(--text);color:var(--white)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:var(--white);border-radius:20px;padding:28px;width:min(460px,92vw);box-shadow:0 8px 40px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{border:none;background:none;font-size:18px;color:var(--muted);cursor:pointer}
.modal-row{margin-bottom:14px}
.modal-label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block}
.modal-input{width:100%;font-size:15px;font-family:var(--font);padding:10px 12px;border:none;border-radius:10px;background:var(--surface);color:var(--text);outline:none}
.modal-input:focus{background:#dcdcd5}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-cancel{font-size:14px;font-family:var(--font);padding:10px 16px;border:none;border-radius:10px;background:var(--surface);color:var(--text);cursor:pointer}
.btn-lime{font-size:14px;font-family:var(--font);font-weight:500;padding:10px 20px;border:none;border-radius:10px;background:var(--lime);color:var(--text);cursor:pointer}

.crop-area{position:relative;width:100%;height:240px;background:#222;border-radius:12px;overflow:hidden;cursor:move;user-select:none;margin-bottom:10px}
.crop-img{position:absolute;transform-origin:0 0}
.crop-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.crop-circle{width:160px;height:160px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 9999px rgba(0,0,0,.45)}
.crop-controls{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.crop-controls label{font-size:12px;color:var(--muted)}
.crop-controls input[type=range]{flex:1;accent-color:var(--lime)}
.upload-box{border:2px dashed rgba(0,0,0,.1);border-radius:10px;background:var(--surface);padding:18px;text-align:center;cursor:pointer;font-size:13px;color:var(--muted)}
.upload-box:hover{background:#dcdcd5}

.preview-box{background:var(--white);border-radius:20px;padding:28px;width:min(340px,92vw);text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.preview-box h3{font-size:16px;font-weight:600;margin-bottom:20px}
.preview-avatar{width:72px;height:72px;border-radius:50%;overflow:hidden;margin:0 auto 12px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:28px}
.preview-avatar img{width:100%;height:100%;object-fit:cover;display:none}
.preview-name-txt{font-size:18px;font-weight:600;margin-bottom:4px}
.preview-sub-txt{font-size:13px;color:var(--muted)}

.proj-modal-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;background:var(--surface);margin-bottom:8px}
.proj-modal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.proj-modal-name{font-size:15px;font-weight:500;flex:1}
.proj-modal-meta{font-size:12px;color:var(--muted)}
.modal-empty{font-size:15px;color:var(--muted);padding:8px 0}

.verse-card{background:var(--white);border-radius:20px;padding:28px}
.verse-badge{font-size:11px;color:var(--lime-dark);letter-spacing:.08em;font-weight:600;text-transform:uppercase;margin-bottom:14px}
.verse-ko{font-size:15px;line-height:1.8;color:var(--text);margin-bottom:12px;font-weight:400;word-break:keep-all}
.verse-en{font-size:12px;line-height:1.75;color:var(--muted);font-style:italic;margin-bottom:12px;word-break:break-word}
.verse-ref{font-size:12px;color:var(--lime-dark);text-align:right;font-weight:600}

@media(max-width:700px){
  body{padding:20px 14px 50px}
  .top-row{grid-template-columns:1fr 1fr 1fr}
  .cal-table{min-width:300px}
  .day-cell{font-size:13px;padding:7px 2px 3px;min-width:28px}
  .proj-add{flex-wrap:wrap}
  .proj-add input[type=text]{min-width:100%}
  .sched-add-row{flex-wrap:wrap}
  .sched-add-row input[type=text]{min-width:100%}
  .card{padding:18px 16px}
  .stat-val{font-size:28px}
  .today-badge{font-size:12px}
}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-title">My Schedule</div>
    <div class="login-sub" id="loginSubTxt">로그인하고 어디서든 일정을 관리하세요</div>
    <label class="login-label">이메일</label>
    <input class="login-input" id="loginEmail" type="email" placeholder="이메일 주소">
    <label class="login-label">비밀번호</label>
    <input class="login-input" id="loginPw" type="password" placeholder="비밀번호">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">로그인</button>
    <div class="login-msg" id="loginMsg"></div>
    <div class="login-toggle" id="loginToggle">계정이 없으신가요? <span onclick="toggleAuthMode()">회원가입</span></div>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">
  <div class="profile-header">
    <div class="profile-avatar-wrap" id="avatarWrap">
      <img class="profile-avatar" id="profileImg" alt="">
      <span id="avatarIcon">👤</span>
    </div>
    <div class="profile-info">
      <div style="display:flex;align-items:center">
        <div class="profile-name" id="profileNameDisplay">My <span class="profile-name-en">schedule</span></div>
        <button class="profile-edit-btn" onclick="openProfileEdit()">✏️ 편집</button>
      </div>
      <div class="profile-sub" id="profileSubDisplay">이름을 설정해 주세요</div>
    </div>
    <div class="profile-right">
      <span class="today-badge" id="todayBadge"></span>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="top-row">
    <div class="stat-card clickable" onclick="openProjModal()">
      <div class="stat-label">진행 프로젝트 ›</div>
      <div class="stat-val" id="statProj">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">오늘 일정</div>
      <div class="stat-val" id="statSched">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">앞으로의 일정</div>
      <div class="stat-val" id="statFuture">0</div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <span class="month-txt" id="monthLabel"></span>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="toggle-btn" id="allToggle" onclick="toggleAll()">전체 보기</button>
        <span style="font-size:11px;letter-spacing:.6px">프로젝트 캘린더</span>
      </div>
    </div>
    <div class="cal-wrap"><table class="cal-table" id="calTable"></table></div>
    <div id="dayPanel"></div>
    <div class="legend" id="projLegend"></div>
    <p class="holiday-note" id="holidayNote"></p>
    <div class="proj-add">
      <input type="text" id="projName" placeholder="프로젝트명">
      <div class="datepick-wrap">
        <button class="date-btn" id="startBtn" onclick="openDatePick('start',event)">시작일</button>
        <div class="datepick-popup" id="startPopup"></div>
      </div>
      <div class="datepick-wrap">
        <button class="date-btn" id="endBtn" onclick="openDatePick('end',event)">종료일</button>
        <div class="datepick-popup" id="endPopup"></div>
      </div>
      <select id="projCat" style="flex-shrink:0">
        <option value="b2b">B2B</option>
        <option value="b2c">B2C</option>
        <option value="coasis">COASIS</option>
        <option value="cit">CiT</option>
        <option value="team">우리 팀</option>
        <option value="etc">기타</option>
        <option value="todo">To do</option>
      </select>
      <button class="add-btn" onclick="addProject()" style="flex-shrink:0">+ 추가</button>
    </div>
    <p class="save-notice" id="saveNotice">저장됨 ✓</p>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="section-label">
      <span id="schedCardLabel">오늘 일정</span>
      <input type="date" id="schedDatePicker" onchange="onSchedDateChange()">
    </div>
    <div class="schedule-list" id="schedList"></div>
    <div class="sched-add-row">
      <input type="time" id="schedTime" value="10:00">
      <input type="text" id="schedTitle" placeholder="일정 제목">
      <select id="schedType">
        <option value="design">디자인 작업</option>
        <option value="meeting">회의·미팅</option>
        <option value="appointment">약속</option>
        <option value="todo">할일</option>
        <option value="rest">휴식</option>
        <option value="metime">미타임</option>
        <option value="church">교회</option>
        <option value="family">가족모임</option>
        <option value="godtime">God Time</option>
      </select>
      <button class="add-btn" onclick="addSched()">추가</button>
    </div>
  </div>

  <div class="verse-card">
    <div class="verse-badge">📖 오늘의 말씀</div>
    <div class="verse-ko" id="verseKo"></div>
    <div class="verse-en" id="verseEn"></div>
    <div class="verse-ref" id="verseRef"></div>
  </div>
</div>

<div class="modal-bg" id="profileModal">
  <div class="modal-box">
    <div class="modal-title">프로필 편집</div>
    <div class="modal-row">
      <label class="modal-label">이름</label>
      <input class="modal-input" id="editName" placeholder="이름">
    </div>
    <div class="modal-row">
      <label class="modal-label">직업 또는 역할</label>
      <input class="modal-input" id="editSub" placeholder="직업 또는 역할">
    </div>
    <div class="modal-row">
      <label class="modal-label">프로필 사진</label>
      <div id="cropSection" style="display:none">
        <div class="crop-area" id="cropArea">
          <img class="crop-img" id="cropImg" alt="">
          <div class="crop-overlay"><div class="crop-circle"></div></div>
        </div>
        <div class="crop-controls">
          <label>크기</label>
          <input type="range" id="cropZoom" min="0.5" max="4" step="0.01" value="1" oninput="updateCrop()">
        </div>
      </div>

function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function luminance(h){const{r,g,b}=hexToRgb(h);return .299*r+.587*g+.114*b;}
function darken(h,a=40){let{r,g,b}=hexToRgb(h);r=Math.max(0,r-a);g=Math.max(0,g-a);b=Math.max(0,b-a);return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function getPal(p){const f=p.color||'#ccefd4';return{fill:f,text:luminance(f)>160?'#1a1a1a':'#fff',dot:darken(f,50),label:CAT_LABEL[p.cat]||p.cat||''};}
function getColorForNew(){const used=projects.map(p=>p.color).filter(Boolean);const avail=DEFAULT_COLORS.filter(c=>!used.includes(c));if(avail.length)return avail[0];const cnt={};DEFAULT_COLORS.forEach(c=>cnt[c]=0);used.forEach(c=>{if(cnt[c]!==undefined)cnt[c]++;});return DEFAULT_COLORS.reduce((a,b)=>cnt[a]<=cnt[b]?a:b);}

  if(ts<s)return'upcoming';if(ts>e)return'overdue';return'active';
}

let _pickStart=null,_pickEnd=null,_dpMode=null,_dpYear=null,_dpMonth=null;
function openDatePick(mode,e){
  e.stopPropagation();
  document.getElementById(mode==='start'?'endPopup':'startPopup').classList.remove('open');
  _dpMode=mode;if(!_dpYear){_dpYear=viewYear;_dpMonth=viewMonth;}

}
function renderDatePick(){
  const popup=document.getElementById(_dpMode==='start'?'startPopup':'endPopup');
  const y=_dpYear,m=_dpMonth,days=daysInMonth(y,m),sd=firstDow(y,m);
  const prevM=m===0?11:m-1,prevY=m===0?y-1:y,prevDays=daysInMonth(prevY,prevM);
  let h=`<div class="dp-header"><button class="dp-nav" onclick="dpNav(-1)">◀</button><span class="dp-month-txt">${y}년 ${MONTHS[m]}</span><button class="dp-nav" onclick="dpNav(1)">▶</button></div><div class="dp-grid">`;
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{h+=`<div class="dp-label${i===0?' sun':''}">${d}</div>`;});
  for(let i=0;i<sd;i++)h+=`<div class="dp-cell other">${prevDays-sd+1+i}</div>`;
  for(let d=1;d<=days;d++){
    const dow=(sd+d-1)%7,hn=getHoliday(y,m,d);
    const isToday=y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate();
    const isStart=_pickStart&&_pickStart.y===y&&_pickStart.m===m&&_pickStart.d===d;
    const isEnd=_pickEnd&&_pickEnd.y===y&&_pickEnd.m===m&&_pickEnd.d===d;
    const inR=_pickStart&&_pickEnd&&(()=>{const ts=new Date(y,m,d).getTime();return ts>new Date(_pickStart.y,_pickStart.m,_pickStart.d).getTime()&&ts<new Date(_pickEnd.y,_pickEnd.m,_pickEnd.d).getTime();})();
    let cls='dp-cell';
    if(isStart)cls+=' selected-start';else if(isEnd)cls+=' selected-end';else if(inR)cls+=' in-range';
    if(hn||dow===0)cls+=' holiday';if(isToday)cls+=' today-mark';
    h+=`<div class="${cls}" onclick="dpSelect(${y},${m},${d})">${d}</div>`;
  }
  let nd=1;while((sd+days+nd-1)%7!==0)h+=`<div class="dp-cell other">${nd++}</div>`;
  h+='</div>';popup.innerHTML=h;
}
function dpNav(dir){_dpMonth+=dir;if(_dpMonth>11){_dpMonth=0;_dpYear++;}if(_dpMonth<0){_dpMonth=11;_dpYear--;}renderDatePick();}
function dpSelect(y,m,d){

function toggleAll(){_showAll=!_showAll;const b=document.getElementById('allToggle');b.classList.toggle('active',_showAll);b.textContent=_showAll?'이번 달만':'전체 보기';buildCal();}
function changeMonth(d){viewMonth+=d;if(viewMonth>11){viewMonth=0;viewYear++;}if(viewMonth<0){viewMonth=11;viewYear--;}buildCal();}

function buildCal(){
  const y=viewYear,m=viewMonth;
  document.getElementById('monthLabel').textContent=`${y}년 ${MONTHS[m]}`;
  const days=daysInMonth(y,m),sd=firstDow(y,m),todayD=(y===today.getFullYear()&&m===today.getMonth())?today.getDate():null;
  const table=document.getElementById('calTable');table.innerHTML='';
  const hRow=document.createElement('tr');WDS.forEach((d,i)=>{const th=document.createElement('th');th.textContent=d;if(i===0)th.className='sun';hRow.appendChild(th);});table.appendChild(hRow);
  const cells=[];
  const pm=m===0?11:m-1,py=m===0?y-1:y,pd=daysInMonth(py,pm);
  for(let i=0;i<sd;i++)cells.push({d:pd-sd+1+i,type:'prev'});
  for(let d=1;d<=days;d++)cells.push({d,type:'cur'});
  let nd=1;while(cells.length%7!==0)cells.push({d:nd++,type:'next'});
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
  const schedMap={};
  scheds.forEach(s=>{if(!schedMap[s.date])schedMap[s.date]=[];schedMap[s.date].push(s);});
  const holidays=[];
  weeks.forEach(week=>{
    const tr=document.createElement('tr');tr.className='cal-day-row';
    week.forEach(cell=>{
      const td=document.createElement('td');
      if(cell.type!=='cur'){td.innerHTML=`<div class="day-cell other-month">${cell.d}</div>`;}
      else{
        const d=cell.d,isT=d===todayD,isSun=((sd+d-1)%7)===0,hn=getHoliday(y,m,d);
        if(hn&&!holidays.find(h=>h.name===hn))holidays.push({d,name:hn});
        const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const hasS=schedMap[dateStr]&&schedMap[dateStr].length>0;
        const isSel=_selectedDay===dateStr;
        let cls='day-cell';
        if(isT&&hn)cls+=' today holiday';else if(isT)cls+=' today';else if(hn)cls+=' holiday';else if(isSun)cls+=' sunday';
        if(isSel)cls+=' selected-day';
        td.innerHTML=`<div class="${cls}" onclick="selectDay('${dateStr}')">${d}${hasS?'<span class="sched-dot"></span>':''}</div>`;
      }
      tr.appendChild(td);
    });
    table.appendChild(tr);
    const cc=week.filter(c=>c.type==='cur');if(!cc.length)return;
    const ws=cc[0].d,we=cc[cc.length-1].d;
    const vp=_showAll?projects.map(normP):projects.map(normP).filter(p=>{
      const sY=p.startYear||y,sM=p.startMonth!==undefined?p.startMonth:m;
      const eY=p.endYear||y,eM=p.endMonth!==undefined?p.endMonth:m;
      return new Date(sY,sM,p.start||1)<=new Date(y,m+1,0)&&new Date(eY,eM,p.end||28)>=new Date(y,m,1);
    });
    const active=vp.map(p=>{
      const sM=p.startMonth!==undefined?p.startMonth:m,eM=p.endMonth!==undefined?p.endMonth:m;
      return{...p,start:(sM===m&&(p.startYear||y)===y)?p.start:1,end:(eM===m&&(p.endYear||y)===y)?p.end:daysInMonth(y,m)};
    }).filter(p=>p.end>=ws&&p.start<=we);
    active.forEach(proj=>{
      const pal=getPal(proj),isSame=proj.start===proj.end,isDone=proj.status==='done';
      const btr=document.createElement('tr');btr.className='bar-row';
      week.forEach((cell,ci)=>{
        const d=cell.type==='cur'?cell.d:null,td=document.createElement('td');
        td.style.cssText='padding:2px 3px;height:26px;position:relative;';
        if(d!==null&&d>=proj.start&&d<=proj.end){
          const iTS=d===proj.start,iTE=d===proj.end,isVS=iTS||(ci===0&&d>proj.start);
          if(isVS){
            let span=0;for(let x=ci;x<7;x++){const cd=week[x].type==='cur'?week[x].d:null;if(cd!==null&&cd>=proj.start&&cd<=proj.end)span++;}
            const rL=iTS?5:0,rR=iTE&&ci+span-1<7?5:0;
            const bar=document.createElement('div');
            if(isSame)bar.style.cssText=`position:absolute;top:4px;height:18px;background:${pal.fill};border-radius:6px;left:5px;right:5px;opacity:${isDone?.35:1};display:flex;align-items:center;overflow:hidden;z-index:2;`;
            else bar.style.cssText=`position:absolute;top:4px;height:18px;background:${pal.fill};border-radius:${rL}px ${rR}px ${rR}px ${rL}px;left:${iTS?5:0}px;width:calc(${span*100}% + ${(span-1)*3}px - ${iTS?5:0}px - ${rR}px);opacity:${isDone?.35:1};display:flex;align-items:center;overflow:hidden;z-index:2;`;
            if(iTS){const lbl=document.createElement('span');lbl.textContent=proj.name;lbl.style.cssText=`font-size:${isSame?'11px':'12px'};color:${pal.text};white-space:nowrap;padding:0 6px;font-weight:${isSame?'500':'600'};overflow:hidden;text-overflow:ellipsis;font-family:var(--font);`;bar.appendChild(lbl);}
            td.appendChild(bar);
          }
        }
        btr.appendChild(td);
      });
      table.appendChild(btr);
    });
  });
  const lp=_showAll?projects.map(normP):projects.map(normP).filter(p=>{const sY=p.startYear||y,sM=p.startMonth!==undefined?p.startMonth:m,eY=p.endYear||y,eM=p.endMonth!==undefined?p.endMonth:m;return new Date(sY,sM,p.start||1)<=new Date(y,m+1,0)&&new Date(eY,eM,p.end||28)>=new Date(y,m,1);});
  document.getElementById('projLegend').innerHTML=lp.map(p=>{
    const pal=getPal(p),st=getAutoStatus(p),ss=STATUS_STYLE[st]||STATUS_STYLE.active,isDone=st==='done';
    return`<div class="legend-item"><div class="legend-dot" style="background:${pal.dot};opacity:${isDone?.4:1}"></div><span style="opacity:${isDone?.45:1};text-decoration:${isDone?'line-through':'none'}">${esc(p.name)}&nbsp;<span style="color:${pal.dot};font-size:12px;font-weight:500">${pal.label}</span>&nbsp;${p.start===p.end?p.start+'일 (당일)':p.start+'~'+p.end+'일'}</span><button class="status-badge" style="background:${ss.bg};color:${ss.color}" onclick="toggleStatus(${p.id})">${ss.label}</button><button class="del-btn" onclick="delProject(${p.id})">✕</button></div>`;
  }).join('');
  document.getElementById('holidayNote').textContent=holidays.length?'공휴일 — '+holidays.map(h=>`${h.d}일 ${h.name}`).join(', '):`${MONTHS[m]} 법정공휴일 없음 · 일요일 빨간색`;
  renderDayPanel();updateStats();
}

function selectDay(dateStr){_selectedDay=_selectedDay===dateStr?null:dateStr;buildCal();}
function renderDayPanel(){
  const el=document.getElementById('dayPanel');
  if(!_selectedDay){el.innerHTML='';return;}
  const dayS=scheds.filter(s=>s.date===_selectedDay).sort((a,b)=>a.time.localeCompare(b.time));
  const d=new Date(_selectedDay+'T00:00:00');
  let html=`<div class="day-panel"><div class="day-panel-title">${d.getMonth()+1}월 ${d.getDate()}일 (${WDS[d.getDay()]}) 일정</div>`;
  if(!dayS.length){html+=`<div class="day-panel-empty">일정이 없어요</div>`;}
  else{dayS.forEach(s=>{const st=SCHED[s.type]||SCHED.design;html+=`<div class="day-panel-item"><div style="width:3px;height:20px;border-radius:2px;background:${st.color};flex-shrink:0"></div><span style="font-size:13px;color:var(--muted);min-width:44px">${s.time}</span><span style="flex:1;font-size:14px">${esc(s.title)}</span><span class="sched-tag" style="background:${st.bg};color:${st.tc};font-size:11px">${st.label}</span></div>`;});}
  el.innerHTML=html+'</div>';
}

async function addProject(){
  const name=document.getElementById('projName').value.trim();if(!name||!_pickStart)return;
  const sY=_pickStart.y,sM=_pickStart.m,sD=_pickStart.d;
  const eY=_pickEnd?_pickEnd.y:sY,eM=_pickEnd?_pickEnd.m:sM,eD=_pickEnd?_pickEnd.d:sD;
  await saveProject({name,start:sD,end:eD,startYear:sY,startMonth:sM,endYear:eY,endMonth:eM,cat:document.getElementById('projCat').value,color:getColorForNew()});
  document.getElementById('projName').value='';
  _pickStart=null;_pickEnd=null;
  const sb2=document.getElementById('startBtn');sb2.textContent='시작일';sb2.classList.remove('selected');
  const eb=document.getElementById('endBtn');eb.textContent='종료일';eb.classList.remove('selected');
  buildCal();
}
async function toggleStatus(id){
  const p=projects.find(p=>p.id===id);if(!p)return;
  await updateProjectStatus(id,p.status==='done'?'active':'done');buildCal();
}
async function delProject(id){await deleteProject(id);buildCal();}

let _schedDate=todayKey();
function onSchedDateChange(){_schedDate=document.getElementById('schedDatePicker').value||todayKey();updateSchedLabel();renderScheds();}
function updateSchedLabel(){
  const lbl=document.getElementById('schedCardLabel');
  if(_schedDate===todayKey()){lbl.textContent='오늘 일정';return;}
  const d=new Date(_schedDate+'T00:00:00');
  lbl.textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${WDS[d.getDay()]}) 일정`;
}
function renderScheds(){
  const list=document.getElementById('schedList');
  const dayS=scheds.filter(s=>s.date===_schedDate).sort((a,b)=>a.time.localeCompare(b.time));
  if(!dayS.length){list.innerHTML=`<p class="empty-msg">${_schedDate===todayKey()?'오늘':'해당 날짜'} 일정이 없어요</p>`;updateStats();return;}
  list.innerHTML=dayS.map(s=>{const st=SCHED[s.type]||SCHED.design;return`<div class="sched-item"><span class="sched-time">${s.time}</span><div class="sched-accent" style="background:${st.color}"></div><div class="sched-info"><span class="sched-title-txt">${esc(s.title)}</span><span class="sched-tag" style="background:${st.bg};color:${st.tc}">${st.label}</span></div><button class="del-btn" onclick="delSchedUI(${s.id})">✕</button></div>`;}).join('');
  updateStats();
}
async function delSchedUI(id){await deleteSched(id);renderScheds();buildCal();}
async function addSched(){
  const time=document.getElementById('schedTime').value,title=document.getElementById('schedTitle').value.trim(),type=document.getElementById('schedType').value;
  if(!title)return;
  await saveSched({date:_schedDate,time,title,type});
  document.getElementById('schedTitle').value='';
  renderScheds();buildCal();
}
function updateStats(){
  document.getElementById('statProj').textContent=projects.map(normP).filter(p=>{if(p.cat==='todo')return false;const s=getAutoStatus(p);return s==='active'||s==='overdue';}).length;
  document.getElementById('statSched').textContent=scheds.filter(s=>s.date===todayKey()).length;
  const nowTs=new Date(todayKey()+'T00:00:00').getTime();
  document.getElementById('statFuture').textContent=scheds.filter(s=>new Date(s.date+'T00:00:00').getTime()>nowTs).length;
}

let cropX=0,cropY=0,cropScale=1,cropNatW=0,cropNatH=0,isDragging=false,dSX=0,dSY=0,dSCX=0,dSCY=0,_pendingAvatar=null;
function onPhotoSelected(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=document.getElementById('cropImg');
    img.onload=()=>{
      cropNatW=img.naturalWidth;cropNatH=img.naturalHeight;
      const area=document.getElementById('cropArea'),aW=area.offsetWidth,aH=area.offsetHeight;
      cropScale=Math.max(aW/cropNatW,aH/cropNatH);
      document.getElementById('cropZoom').min=cropScale*.8;document.getElementById('cropZoom').value=cropScale;
      cropX=(aW-cropNatW*cropScale)/2;cropY=(aH-cropNatH*cropScale)/2;updateCrop();
    };
    img.src=ev.target.result;
    document.getElementById('cropSection').style.display='block';document.getElementById('uploadBox').style.display='none';
  };
  reader.readAsDataURL(file);
}
function updateCrop(){cropScale=parseFloat(document.getElementById('cropZoom').value);const img=document.getElementById('cropImg');img.style.width=cropNatW*cropScale+'px';img.style.height=cropNatH*cropScale+'px';img.style.left=cropX+'px';img.style.top=cropY+'px';}
function clampCrop(){const area=document.getElementById('cropArea'),aW=area.offsetWidth,aH=area.offsetHeight;cropX=Math.min(0,Math.max(aW-cropNatW*cropScale,cropX));cropY=Math.min(0,Math.max(aH-cropNatH*cropScale,cropY));}
const cropArea=document.getElementById('cropArea');
cropArea.addEventListener('mousedown',e=>{isDragging=true;dSX=e.clientX;dSY=e.clientY;dSCX=cropX;dSCY=cropY;e.preventDefault();});
document.addEventListener('mousemove',e=>{if(!isDragging)return;cropX=dSCX+(e.clientX-dSX);cropY=dSCY+(e.clientY-dSY);clampCrop();updateCrop();});
document.addEventListener('mouseup',()=>isDragging=false);
cropArea.addEventListener('touchstart',e=>{isDragging=true;const t=e.touches[0];dSX=t.clientX;dSY=t.clientY;dSCX=cropX;dSCY=cropY;e.preventDefault();},{passive:false});
document.addEventListener('touchmove',e=>{if(!isDragging)return;const t=e.touches[0];cropX=dSCX+(t.clientX-dSX);cropY=dSCY+(t.clientY-dSY);clampCrop();updateCrop();},{passive:false});
document.addEventListener('touchend',()=>isDragging=false);
function getCroppedImage(){return new Promise(resolve=>{const area=document.getElementById('cropArea'),aW=area.offsetWidth,aH=area.offsetHeight,r=80,cx=aW/2,cy=aH/2,canvas=document.createElement('canvas');canvas.width=320;canvas.height=320;const ctx=canvas.getContext('2d');ctx.beginPath();ctx.arc(160,160,160,0,Math.PI*2);ctx.clip();const img=document.getElementById('cropImg');ctx.drawImage(img,(cx-r-cropX)/cropScale,(cy-r-cropY)/cropScale,r*2/cropScale,r*2/cropScale,0,0,320,320);resolve(canvas.toDataURL('image/jpeg',.9));});}

function renderProfileData(p){
  document.getElementById('profileNameDisplay').innerHTML=p.name?`${esc(p.name)} <span class="profile-name-en">schedule</span>`:'My <span class="profile-name-en">schedule</span>';
  document.getElementById('profileSubDisplay').textContent=p.sub||'이름을 설정해 주세요';
  const img=document.getElementById('profileImg'),icon=document.getElementById('avatarIcon');
  if(p.avatar){img.src=p.avatar;img.style.display='block';if(icon)icon.style.display='none';}
  else{img.src='';img.style.display='none';if(icon)icon.style.display='';}
}
function openProfileEdit(){
  document.getElementById('editName').value='';document.getElementById('editSub').value='';
  document.getElementById('cropSection').style.display='none';document.getElementById('uploadBox').style.display='block';
  document.getElementById('avatarUpload').value='';_pendingAvatar=null;
  sb.from('profiles').select('*').eq('id',currentUser.id).single().then(({data})=>{
    if(data){document.getElementById('editName').value=data.name||'';document.getElementById('editSub').value=data.sub||'';}
  });
  document.getElementById('profileModal').classList.add('open');
}
function closeProfileEdit(){document.getElementById('profileModal').classList.remove('open');}
async function openPreview(){
  const name=document.getElementById('editName').value.trim(),sub=document.getElementById('editSub').value.trim();
  if(document.getElementById('cropSection').style.display!=='none'){_pendingAvatar=await getCroppedImage();}
  const pi=document.getElementById('previewAvatarImg'),picon=document.getElementById('previewAvatarIcon');
  if(_pendingAvatar){pi.src=_pendingAvatar;pi.style.display='block';picon.style.display='none';}else{pi.style.display='none';picon.style.display='';}
  document.getElementById('previewName').textContent=(name||'My')+' schedule';
  document.getElementById('previewSub').textContent=sub||'이름을 설정해 주세요';
  document.getElementById('previewModal').classList.add('open');
}
function closePreview(){document.getElementById('previewModal').classList.remove('open');}
async function applyProfile(){
  const name=document.getElementById('editName').value.trim(),sub=document.getElementById('editSub').value.trim();
  const data={name,sub};if(_pendingAvatar)data.avatar=_pendingAvatar;
  await saveProfileToDB(data);renderProfileData(data);closePreview();closeProfileEdit();
}
document.getElementById('profileModal').addEventListener('click',function(e){if(e.target===this)closeProfileEdit();});
